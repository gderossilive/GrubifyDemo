# Response Plan: Grubify HTTP 5xx Alerts
#
# This configures the ServiceNow response plan filter that routes Grubify HTTP
# 5xx ServiceNow incidents to the incident-handler sub-agent. Azure Monitor
# remains the metric signal source; ServiceNow is the incident system of record.
#
# Deployment:
#   - The deploy script (scripts/deploy-sre-agent.sh) creates the ServiceNow
#     response plan filter via /api/v1/incidentPlayground/filters.
#   - The ServiceNow Logic App does not forward enriched payloads to the SRE
#     Agent. The SRE Agent retrieves incident details from ServiceNow.
#
# Default path:
# Azure Monitor Alert -> Action Group (Logic App receiver) -> Logic App ServiceNow handler
#   -> ServiceNow incident -> native SRE Agent ServiceNow incident platform
#   -> incident-handler
#
# Direct fallback path, only when ENABLE_SERVICENOW_HANDLER=false:
# Azure Monitor Alert -> Action Group (webhook) -> SRE Agent HTTP Trigger

name: grubify-http-5xx-response-plan
description: >
  Automatically triggers the incident-handler agent to investigate and mitigate
  HTTP 5xx errors in the Grubify Container Apps (frontend + API).

# Which sub-agent handles incidents fired by this trigger.
# incident-handler will:
#   1. Search knowledge base for the http-500-errors runbook
#   2. Query App Insights and Log Analytics for error context
#   3. Attempt remediation (scale out, restart, config changes)
#   4. Update ServiceNow throughout the lifecycle
#   5. Hand off source-code analysis to code-analyzer when needed
agent: incident-handler

responsePlanFilter:
   id: grubify-http-errors
   name: Grubify HTTP Errors Filter
   documentType: IncidentFilterServiceNow
   partitionKey: IncidentFilterServiceNow
   incidentType: ServiceNow
   priorities: []
   titleContains: alert-http-5xx-grubify
   handlingAgent: incident-handler
   agentMode: autonomous
   isEnabled: true
   maxAutomatedInvestigationAttempts: 3
   deepInvestigationEnabled: false
   mergeEnabled: true
   mergeWindowHours: 3

# The prompt injected when the ServiceNow response plan routes the incident.
agentPrompt: |
   A ServiceNow-backed HTTP 5xx incident has opened for the Grubify application.
   Azure Monitor supplied the metric signal, but the Logic App has opened the
   ServiceNow incident as the system-of-record ticket and acknowledged the Azure
   Monitor alert. Do not expect an enriched HTTP trigger payload. Retrieve all
   needed incident details from ServiceNow with GetServiceNowIncident, including
   correlation_id, correlation_display, short_description, description, comments,
   and Azure alert identifiers. Maintain the ServiceNow incident throughout the
   lifecycle and resolve it after successful remediation when the ServiceNow
   tools are available.

   Follow these steps:
   1. Search memory for the "http-500-errors" runbook and execute ALL diagnostic steps.
   2. Query App Insights (resource: appi-sre-grubify) for recent request failures,
      exceptions, and dependencies — use the last 30 minutes window.
   3. Query the Log Analytics workspace (law-sre-grubify) for container logs
      from ca-grubify-api and ca-grubify-frontend.
   4. Identify root cause, then attempt remediation:
      - If memory pressure: restart the container app revision
      - If dependency failure: report and escalate
      - If code error is suspected: identify the failing endpoint and log error evidence, then hand off source-code analysis to code-analyzer
   5. Summarize findings and remediation actions in a clear incident report.
      Search memory for the "incident report template" and follow it exactly.

# Agent operating mode: autonomous allows writes (restarts, scaling, etc.)
agentMode: autonomous
