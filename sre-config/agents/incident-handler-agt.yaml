api_version: azuresre.ai/v1
kind: AgentConfiguration
spec:
  name: incident-handler-agt
  system_prompt_file: instructions/incident-handler-agt.instructions.md
  handoff_description: Governed incident handler using AGT hooks; investigates runtime evidence, updates ServiceNow, and posts to Teams without source-code access
  agent_type: Autonomous
  hooks:
    Start:
      - script_file: ../governance/hooks/agt_hook_client.py
        hook_type: start_audit
        failMode: allow
    PreToolUse:
      - matcher: '*'
        script_file: ../governance/hooks/agt_hook_client.py
        hook_type: pre_tool_policy
        failMode: block
    PostToolUse:
      - matcher: '*'
        script_file: ../governance/hooks/agt_hook_client.py
        hook_type: post_tool_audit
        failMode: allow
    Stop:
      - script_file: ../governance/hooks/agt_hook_client.py
        hook_type: stop_quality
        failMode: allow
  tools:
    - SearchMemory
    - RunAzCliReadCommands
    - RunAzCliWriteCommands
    - GetAzCliHelp
    - QueryLogAnalyticsByWorkspaceId
    - QueryAppInsightsByResourceId
    - ExecutePythonCode
    - AcknowledgeServiceNowIncident
    - GetServiceNowIncident
    - PostServiceNowDiscussionEntry
    - ResolveServiceNowIncident
    - GetTeamsMessages
    - PostTeamsMessage
    - ReplyToTeamsMessage
  mcp_tools:
    - teams-mcp/*
