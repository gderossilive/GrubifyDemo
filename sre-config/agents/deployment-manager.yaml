# Deployment Manager Subagent
# Orchestrates Grubify releases through GitHub Actions. GitHub credentials come
# from the configured GitHub connector OAuth/PAT token; no separate PAT is
# required unless the connector token lacks workflow dispatch permission.
api_version: azuresre.ai/v1
kind: AgentConfiguration
spec:
  name: deployment-manager
  system_prompt_file: instructions/deployment-manager.instructions.md
  skill_files:
    - skills/deployment-manager-release-orchestration.skill.md
  handoff_description: Orchestrates Grubify GitHub Actions releases using connector-backed authentication, validates baseline health, then hands off to tests-manager when requested
  agent_type: Autonomous
  tools:
    - SearchMemory
    - RunAzCliReadCommands
    - GetAzCliHelp
    - QueryLogAnalyticsByWorkspaceId
    - QueryAppInsightsByResourceId
    - ExecutePythonCode
    - RunInTerminal
  mcp_tools:
    - github-mcp/*
  connectors:
    - github
