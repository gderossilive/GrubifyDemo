api_version: azuresre.ai/v1
kind: AgentConfiguration
spec:
  name: incident-handler
  system_prompt_file: instructions/incident-handler-full.instructions.md
  handoff_description: Investigates incidents using runbooks, creates GitHub issues, and posts to Teams
  agent_type: Autonomous
  tools:
    - SearchMemory
    - RunAzCliReadCommands
    - RunAzCliWriteCommands
    - GetAzCliHelp
    - QueryLogAnalyticsByWorkspaceId
    - QueryAppInsightsByResourceId
    - ExecutePythonCode
    - AcknowledgeServiceNowIncident
    - GetServiceNowIncident
    - PostServiceNowDiscussionEntry
    - ResolveServiceNowIncident
  mcp_tools:
    - github-mcp/*
    - teams-mcp/*
