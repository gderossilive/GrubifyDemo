# Microsoft Teams MCP Connector
# OAuth 2.0 client_credentials flow (app-only).
# Register an app in Entra ID at https://portal.azure.com/#view/Microsoft_AAD_RegisteredApps
# and grant Application permission: ChannelMessage.Send (Microsoft Graph), then admin-consent.
#
# Target channel:
#   Team (Group) ID : TEAMS_GROUP_ID_PLACEHOLDER
#   Channel         : GrubifyOps
#   Channel ID      : TEAMS_CHANNEL_ID_PLACEHOLDER
#   Tenant ID       : TEAMS_TENANT_ID_PLACEHOLDER
#
# Apply and authenticate this connector in the SRE Agent portal when Teams
# notifications are enabled. The current preview API lists data connectors but
# does not expose a supported connector create/auth endpoint for this YAML.
api_version: azuresre.ai/v1
kind: DataConnector
spec:
  name: teams-mcp
  type: Mcp
  endpoint: https://graph.microsoft.com/mcp/
  auth:
    type: OAuth
    grant_type: client_credentials
    token_url: https://login.microsoftonline.com/TEAMS_TENANT_ID_PLACEHOLDER/oauth2/v2.0/token
    scopes:
      - https://graph.microsoft.com/.default
    credentials: pending_manual_setup
