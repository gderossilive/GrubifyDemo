name: grubify
metadata:
  template: grubify-food-delivery@0.0.1-beta

services:
  api:
    project: ./GrubifyApi
    language: dotnet
    host: containerapp
    docker:
      remoteBuild: true

  frontend:
    project: ./grubify-frontend
    language: js
    host: containerapp
    docker:
      remoteBuild: true

  governance:
    project: ./sre-config/governance/function_app
    language: py
    host: function

hooks:
  preprovision:
    shell: sh
    run: |
      python3 bin/assemble-agent.py --dry-run

  postdeploy:
    shell: sh
    run: |
      python3 bin/assemble-agent.py
      python3 bin/apply-extras.py
      echo "Grubify Food Delivery App deployed successfully!"
      echo "Frontend URL: $FRONTEND_URL"
      echo "API URL: $API_BASE_URL"
      echo "AGT Governance URL: $AGT_FUNCTION_URL"
      echo "SRE Agent: $SRE_AGENT_NAME"
      echo "SRE Agent Endpoint: $SRE_AGENT_ENDPOINT"
