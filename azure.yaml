name: grubify
metadata:
  template: grubify-food-delivery@0.0.1-beta

services:
  api:
    project: ./GrubifyApi
    language: dotnet
    host: containerapp
    docker:
      remoteBuild: true

  frontend:
    project: ./grubify-frontend
    language: js
    host: containerapp
    docker:
      remoteBuild: true

  governance:
    project: ./sre-config/governance/function_app
    language: py
    host: function

hooks:
  postdeploy:
    shell: pwsh
    run: |
      echo "🍕 Grubify Food Delivery App deployed successfully!"
      echo "Frontend URL: $env:FRONTEND_URL"
      echo "API URL: $env:API_BASE_URL"
      echo "AGT Governance URL: $env:AGT_FUNCTION_URL"
